<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>회원가입 | Law RAG Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="max-w-md mx-auto px-6 py-16">
    <a href="/" class="text-slate-300 hover:text-white text-sm">← 홈</a>
    <h1 class="mt-6 text-2xl font-semibold">회원가입</h1>
    <p class="mt-2 text-sm text-slate-300">가입 즉시 사용자별 <span class="text-white">Client ID</span>가 생성됩니다.</p>

    <div data-toast class="hidden mt-4 px-4 py-3 rounded-xl border border-white/10 bg-white/5 text-sm"></div>

    <form id="f" class="mt-8 space-y-4">
      <div>
        <label class="text-sm text-slate-300">이름</label>
        <input name="name" type="text" required class="mt-2 w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="홍길동" />
      </div>
      <div>
        <label class="text-sm text-slate-300">이메일</label>
        <input name="email" type="email" required class="mt-2 w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="you@example.com" />
      </div>
      <div>
        <label class="text-sm text-slate-300">비밀번호</label>
        <input name="password" type="password" required class="mt-2 w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="8자 이상 권장" />
      </div>

      <button class="w-full px-4 py-3 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-semibold">가입하기</button>
    </form>

    <div class="mt-6 text-sm text-slate-300">
      이미 계정이 있나요? <a class="text-indigo-300 hover:text-indigo-200" href="/login.html">로그인</a>
    </div>
  </div>

  <script type="module">
    import { api, setToast } from "/js/common.js";

    const f = document.getElementById("f");
    f.addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(f);
      try {
        await api("/api/auth/register", {
          method: "POST",
          body: {
            name: fd.get("name"),
            email: fd.get("email"),
            password: fd.get("password"),
          }
        });
        // auto-login
        await api("/api/auth/login", {
          method: "POST",
          body: { email: fd.get("email"), password: fd.get("password") }
        });
        location.href = "/app.html";
      } catch (err) {
        setToast(err.message, "error");
      }
    });
  </script>
</body>
</html>
